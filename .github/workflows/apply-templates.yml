name: Apply templates and refresh site metadata

on:
  push:
    paths:
      - 'docs/**'
      - 'templates/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'templates/**'
      - 'scripts/**'

jobs:
  apply-templates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run apply_templates (apply changes)
        run: |
          node scripts/apply_templates.js --apply --force

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: apply templates & refresh course metadata [automated]" || echo "No commit"
            git push || echo "Push failed"
          else
            echo "No changes to commit"
          fi
