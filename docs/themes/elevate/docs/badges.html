<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elevate Badges</title>
    <link rel="stylesheet" href="../components/theme.css">
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="brand" href="index.html"><span class="brand-mark">FS</span><span>Elevate</span></a>
        <div class="nav-links">
          <a class="nav-link" href="index.html">Overview</a>
          <a class="nav-link" href="buttons.html">Buttons</a>
          <a class="nav-link" href="cards.html">Cards</a>
          <a class="nav-link" href="forms.html">Forms</a>
          <a class="nav-link is-active" href="badges.html">Badges</a>
          <a class="nav-link" href="gamification.html">Gamification</a>
        </div>
      </div>
    </nav>
    <main class="section">
      <div class="container-md stack-lg">
        <div class="stack">
          <span class="text-caption">Components</span>
          <h1>Badges</h1>
          <p class="text-lead">Compact status, reward, and skill markers that keep feedback visible without taking over the interface.</p>
        </div>
        <section class="card">
          <div class="card-body">
            <div class="cluster">
              <span class="badge">Default</span>
              <span class="badge badge-primary">Active</span>
              <span class="badge badge-success">Complete</span>
              <span class="badge badge-warning">Review</span>
              <span class="badge badge-danger">Blocked</span>
              <span class="badge badge-xp">+180 XP</span>
              <span class="badge badge-gold">Gold</span>
            </div>
            <div class="cluster">
              <span class="level-pill"><span class="level-dot">4</span>React Ranger</span>
              <span class="level-pill"><span class="level-dot">9</span>Systems Shipper</span>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
