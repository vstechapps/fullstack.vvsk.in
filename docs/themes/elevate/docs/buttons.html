<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elevate Buttons</title>
    <link rel="stylesheet" href="../components/theme.css">
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="brand" href="index.html"><span class="brand-mark">FS</span><span>Elevate</span></a>
        <div class="nav-links">
          <a class="nav-link" href="index.html">Overview</a>
          <a class="nav-link is-active" href="buttons.html">Buttons</a>
          <a class="nav-link" href="cards.html">Cards</a>
          <a class="nav-link" href="forms.html">Forms</a>
          <a class="nav-link" href="badges.html">Badges</a>
          <a class="nav-link" href="gamification.html">Gamification</a>
        </div>
      </div>
    </nav>
    <main class="section">
      <div class="container-md stack-lg">
        <div class="stack">
          <span class="text-caption">Components</span>
          <h1>Buttons</h1>
          <p class="text-lead">Action styles for lessons, quests, labs, payments, and account flows.</p>
        </div>
        <section class="card">
          <div class="card-body stack-lg">
            <div class="cluster">
              <button class="btn btn-primary">Start lesson</button>
              <button class="btn btn-success">Submit lab</button>
              <button class="btn btn-subtle">Save draft</button>
              <button class="btn btn-ghost">Skip</button>
              <button class="btn btn-danger">Reset attempt</button>
            </div>
            <div class="cluster">
              <button class="btn btn-primary btn-sm">Small</button>
              <button class="btn btn-primary">Default</button>
              <button class="btn btn-primary btn-lg">Large</button>
              <button class="btn btn-icon" aria-label="Open command menu">C</button>
            </div>
            <div class="btn-group" aria-label="Lesson view">
              <button class="btn btn-subtle">Theory</button>
              <button class="btn btn-subtle">Practice</button>
              <button class="btn btn-subtle">Review</button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
