<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Elevate Forms</title>
    <link rel="stylesheet" href="../components/theme.css">
  </head>
  <body>
    <nav class="nav">
      <div class="container nav-inner">
        <a class="brand" href="index.html"><span class="brand-mark">FS</span><span>Elevate</span></a>
        <div class="nav-links">
          <a class="nav-link" href="index.html">Overview</a>
          <a class="nav-link" href="buttons.html">Buttons</a>
          <a class="nav-link" href="cards.html">Cards</a>
          <a class="nav-link is-active" href="forms.html">Forms</a>
          <a class="nav-link" href="badges.html">Badges</a>
          <a class="nav-link" href="gamification.html">Gamification</a>
        </div>
      </div>
    </nav>
    <main class="section">
      <div class="container-sm stack-lg">
        <div class="stack">
          <span class="text-caption">Components</span>
          <h1>Forms</h1>
          <p class="text-lead">Inputs for onboarding, lab submission, code review requests, and cohort settings.</p>
        </div>
        <form class="card">
          <div class="card-body">
            <div class="field">
              <label for="goal">Learning goal</label>
              <input class="input" id="goal" placeholder="Build production-ready fullstack apps">
              <span class="field-hint">Used to personalize quests and review cadence.</span>
            </div>
            <div class="field">
              <label for="track">Track</label>
              <select class="select" id="track">
                <option>Fullstack TypeScript</option>
                <option>Backend Engineering</option>
                <option>Frontend Systems</option>
              </select>
            </div>
            <div class="field">
              <label for="notes">Lab notes</label>
              <textarea class="textarea" id="notes" placeholder="What tradeoffs did you make?"></textarea>
            </div>
            <div class="segmented">
              <button class="segment is-active" type="button">Daily</button>
              <button class="segment" type="button">Weekends</button>
              <button class="segment" type="button">Custom</button>
            </div>
            <label class="check-row"><input type="checkbox" checked> Include streak reminders</label>
          </div>
          <div class="card-footer">
            <button class="btn btn-ghost" type="button">Cancel</button>
            <button class="btn btn-primary" type="submit">Save plan</button>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
